<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOWBOOK</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="navbar">
            <img class="logo" src="image/bowbook_logo.svg" alt="bowbook logo">
            <div class="menu">
                <img id="menuIcon" class="menu-icon" src="image/menu_icon.svg" alt="menu icon">
                <div id="dropdownMenu" class="dropdown">
                    <a href="#" id="loginLink">เข้าสู่ระบบ</a>
                    <a href="#">สถานะการยืม</a>
                    <a href="#">ประวัติการยืม</a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="button-group">
            <button class="card-button borrow">
                <h2>ยืม</h2>
            </button>
            <button class="card-button return">
                <h2>คืน</h2>
            </button>
        </section>
    </main>
    <footer class="footer">
        <img class="footer-logo" src="image/bowbook_footer.svg" alt="bowbook logo">
        <p class="footer-text">
            © 2026 BOWBOOK • Created by Wiphasanee Chailoet
        </p>
    </footer>
    
    <!-- login -->

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="close-header">
                <img id="closeLoginModal" class="close-icon" src="image/close_icon.svg" alt="close icon">
            </div>
                <h2>เข้าสู่ระบบ</h2>
                <label>ชื่อผู้ใช้</label>
                    <input type="text" id="usernamelog">
                <label>รหัสผ่าน</label>
                    <input type="password" id="passwordlog">
            <div class="loginbtn">
                <button id="loginBtn" class="login-btn">ยืนยัน</button>
            </div>
            <p>
                ยังไม่มีบัญชี?
                <a href="#" id="registerLink">ลงทะเบียน</a>
            </p>
        </div>
    </div>

    <!-- register 1 -->

    <div id="registerModal1" class="modal">
        <div class="modal-content">
            <div class="close-header">
                <img id="closeRegisterModal1" class="close-icon" src="image/close_icon.svg" alt="close icon">
            </div>
                <h2>ลงทะเบียน</h2>
                <label>ชื่อ-นามสกุล</label>
                    <input type="text" id="name">
                <label>รหัสนักเรียน</label>
                    <input type="number" id="studentId">
            <div class="nextbtn">
                <button id="nextBtn" class="next-btn">ถัดไป</button>
            </div>
            <p>
                มีบัญชีแล้ว?
                <a href="#" id="backToLogin1">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>

    <!-- register 2 -->

    <div id="registerModal2" class="modal">
        <div class="modal-content">
            <div class="close-header">
                <img id="closeRegisterModal2" class="close-icon" src="image/close_icon.svg" alt="close icon">
            </div>
                <h2>ลงทะเบียน</h2>
                <label>ชื่อผู้ใช้</label>
                    <input type="text" id="usernamereg">
                <label>รหัสผ่าน</label>
                    <input type="password" id="passwordreg">
                <label>ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirmpassword">
            <div class="regbtn">
                <button id="registerBtn" class="reg-btn">ยืนยัน</button>
            </div>
            <p>
                มีบัญชีแล้ว?
                <a href="#" id="backToLogin2">เข้าสู่ระบบ</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
